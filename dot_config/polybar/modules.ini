[module/workspaces]
type = internal/xworkspaces

format = <label-state>

label-active = %name%
label-active-foreground = ${colors.lavender}
label-active-underline = ${colors.lavender}
label-active-padding = 1

label-occupied = %name%
label-occupied-foreground = ${colors.subtext0}
label-occupied-padding = 1

label-urgent = %name%
label-urgent-foreground = ${colors.red}
label-urgent-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.surface0}
label-empty-padding = 1

# ==============================

[module/empty-space]
type = custom/text
label = "  "

# ==============================

[module/time]
type = internal/date
interval = 60

format = <label>
format-foreground = ${colors.rosewater}

date = %H:%M
time-alt = %a, %b %d%{F-}
label = %{A3:st -e tty-clock -cbt -C 4:}  %date%%time% %{A}

# ==============================

[module/audio]
type = internal/pulseaudio
format-volume = %{A3:pavucontrol-qt:} <ramp-volume> <label-volume> %{A}
label-muted = %{A3:pavucontrol-qt:} 󰝟 %percentage%% %{A}
ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
format-volume-foreground = ${colors.teal}
format-muted-foreground = ${colors.overlay0}

# ==============================

[module/cpu]
type = internal/cpu
interval = 0.5

format = <label>

label =  %percentage%%
label-minlen = 6
format-foreground = ${colors.green}

# ==============================

[module/memory]
type = internal/memory
interval = 5
warn-percentage = 95

format = <label>
label =  %percentage_used%%
label-minlen = 6
label-foreground = ${colors.green}

# ==============================

[module/network]
type = internal/network
interface = wlp9s0
interface-type = wireless
interval = 1
format-connected =  <label-connected> 
label-connected = %{A1:nm-connection-editor:} 直 %{A} %essid%  
label-connected-foreground = #B5E8E0
label-disconnected = %{A1:nm-connection-editor:} 睊 %{A}
label-disconnected-foreground = #F28FAD

# ==============================

[module/wired-network]
type = internal/network
interface = enp0s3
interface-type = wired
interval = 1
format-connected = <label-connected> 
format-disconnected = <label-disconnected> 
label-connected = " 󰈀 %local_ip% %downspeed% "
label-connected-minlen = 30
label-connected-alignment = right
label-disconnected = " 󰈀 "
label-disconnected-minlen = 30
label-disconnected-alignment = right
label-connected-foreground = ${colors.pink}
label-disconnected-foreground = ${colors.red}

# ==============================

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP1
full-at = 99
poll-interval = 0.5
;format-background = #1e1e2e

format-charging = <animation-charging> <label-charging>
label-charging = %percentage% %
format-charging-foreground = ${colors.color4}
format-charging-background = #1e1e2e

format-discharging = <ramp-capacity> <label-discharging>  
label-discharging = %percentage%%
format-discharging-foreground = ${colors.color4}
format-discharging-background = #1e1e2e

format-full-prefix = "  "
format-full-prefix-foreground = #ABE9B3
format-foreground = #ABE9B3
format-full-background = #1e1e2e

label-discharging-foreground = #ABE9B3
ramp-capacity-foreground =  #ABE9B3
label-charging-foreground = #ABE9B3

label-padding = 1

ramp-capacity-0 = "  "
ramp-capacity-1 = "  "
ramp-capacity-2 = "  "
ramp-capacity-3 = "  "
ramp-capacity-4 = "   "

animation-charging-0 = "  "
animation-charging-1 = "  "
animation-charging-2 = "  "
animation-charging-3 = "  "
animation-charging-4 = "  "

animation-charging-foreground = #ABE9B3
animation-charging-framerate = 750

format-charging-padding = 1
format-discharging-padding = 1

# ==============================

[module/spotify]
type = custom/script
interval = 1
format-prefix = "阮 "
format-prefix-foreground = #ABE9B3
;format-foreground = #ABE9B3
format = <label>
exec = python ~/.config/polybar/spotify-status.py -f '{song} | {artist}'
;format-underline = #ABE9B3
;control players (optional)
click-left = playerctl --player=spotify play-pause 
click-right = playerctl --player=spotify next 
click-middle = playerctl --player=spotify previous

# ==============================

[module/backlight]
type = internal/backlight
# card = intel_backlight
use-actual-brightness = true
poll-interval = 0
enable-scroll = false
format =" <ramp> <label>"
label = "%percentage%%"
ramp-foreground = #89DCEB
label-foreground = #89DCEB
format-background = #1e1e2e

; only applies if <ramp> is used
ramp-0 = "  "
ramp-1 = "  "
